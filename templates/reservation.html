{% extends 'base.html' %}
{% block title %}Reservation | Mirame Cafe & Kitchen{% endblock %}

{% block content %}
<!-- Page Header -->
<section class="pt-32 pb-16 bg-espresso text-cream relative">
    <div class="container mx-auto px-6 relative z-10 text-center reveal-up">
        <h1 class="font-serif text-5xl md:text-6xl font-bold mb-4">Reserve a Table</h1>
        <div class="w-20 h-1 bg-gold mx-auto mb-6"></div>
        <p class="text-xl max-w-2xl mx-auto text-cream/80">Experience luxury dining. Secure your spot today.</p>
    </div>
</section>

<!-- Reservation Form -->
<section class="py-24 bg-cream">
    <div class="container mx-auto px-6 lg:px-12 flex justify-center">

        <div class="w-full max-w-3xl bg-white rounded-xl shadow-premium p-8 md:p-12 reveal-up border-t-4 border-gold">

            <div class="text-center mb-10">
                <i class="fa-solid fa-bell-concierge text-4xl text-gold mb-4"></i>
                <h2 class="font-serif text-3xl text-espresso font-bold">Book Your Experience</h2>
                <p class="text-espresso/70 mt-2">Fill out the details below to reserve your table</p>
            </div>

            <form action="{{ url_for('reservation') }}" method="POST" class="space-y-6">

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label for="name" class="block text-espresso font-medium mb-2">Full Name</label>
                        <input type="text" id="name" name="name" required class="form-input" placeholder="John Doe">
                    </div>
                    <div>
                        <label for="phone" class="block text-espresso font-medium mb-2">Phone Number</label>
                        <input type="tel" id="phone" name="phone" required class="form-input"
                            placeholder="+91 98765 43210">
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                    <div>
                        <label for="guests" class="block text-espresso font-medium mb-2">Guests</label>
                        <select id="guests" name="guests" required class="form-input text-espresso/80">
                            <option value="1">1 Person</option>
                            <option value="2" selected>2 People</option>
                            <option value="3">3 People</option>
                            <option value="4">4 People</option>
                            <option value="5">5 People</option>
                            <option value="6">6+ People</option>
                        </select>
                    </div>
                    <div>
                        <label for="date" class="block text-espresso font-medium mb-2">Date</label>
                        <input type="date" id="date" name="date" required class="form-input">
                    </div>
                    <div>
                        <label for="time" class="block text-espresso font-medium mb-2">Time</label>
                        <input type="time" id="time" name="time" required class="form-input">
                    </div>
                </div>

                <div>
                    <label for="special_request" class="block text-espresso font-medium mb-2">Special Request
                        (Optional)</label>
                    <textarea id="special_request" name="special_request" rows="4" class="form-input"
                        placeholder="Any dietary preferences or special occasions?"></textarea>
                </div>

                <div class="text-center pt-4">
                    <button type="submit" class="btn-primary w-full md:w-auto px-12 py-4 text-lg">Confirm
                        Reservation</button>
                </div>

            </form>

        </div>

    </div>
</section>
{% endblock %}
