{% extends 'base.html' %}
{% block title %}Gallery | Mirame Cafe & Kitchen{% endblock %}

{% block content %}
<!-- Page Header -->
<section class="pt-32 pb-16 bg-espresso text-cream relative">
    <div class="container mx-auto px-6 relative z-10 text-center reveal-up">
        <h1 class="font-serif text-5xl md:text-6xl font-bold mb-4">Gallery</h1>
        <div class="w-20 h-1 bg-gold mx-auto mb-6"></div>
        <p class="text-xl max-w-2xl mx-auto text-cream/80">A visual taste of the Mirame experience.</p>
    </div>
</section>

<!-- Gallery Grid -->
<section class="py-24 bg-cream">
    <div class="container mx-auto px-6 lg:px-12">

        <div class="columns-1 md:columns-2 lg:columns-3 gap-6 space-y-6">
            <!-- Image 1 -->
            <div class="break-inside-avoid shadow-premium rounded-lg overflow-hidden group cursor-pointer relative"
                x-data="{ showOverlay: false }" @mouseenter="showOverlay = true" @mouseleave="showOverlay = false">
                <img src="https://images.unsplash.com/photo-1554118811-1e0d58224f24?q=80&w=800&auto=format&fit=crop"
                    alt="Cafe Interior"
                    class="w-full h-auto object-cover transform transition-transform duration-700 group-hover:scale-110">
                <div
                    class="absolute inset-0 bg-espresso/60 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity duration-300">
                    <i class="fa-solid fa-magnifying-glass-plus text-3xl text-gold"></i>
                </div>
            </div>

            <!-- Image 2 -->
