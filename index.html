<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mirame Cafe & Kitchen</title>
    
    <!-- Tailwind CSS (We use CDN in project, or we could add it to Vite but using CDN keeps it exact to the user's project right now) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        espresso: '#2C1E16',
                        cream: '#FAF7F2',
                        gold: '#D4AF37',
                        lightgold: '#F5E6B3',
                        overlay: 'rgba(44, 30, 22, 0.6)'
                    },
                    fontFamily: {
                        sans: ['Outfit', 'sans-serif'],
                        serif: ['Playfair Display', 'serif'],
                    },
                    boxShadow: {
                        'premium': '0 10px 30px -10px rgba(44, 30, 22, 0.15)',
                    }
                }
            }
        }
    </script>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap"
        rel="stylesheet">
        
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- ScrollReveal JS is imported in React components, but we can also load CDN if required -->
  </head>
  <body class="bg-cream text-espresso font-sans antialiased overflow-x-hidden flex flex-col min-h-screen">
    <div id="root" class="flex flex-col min-h-screen"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
